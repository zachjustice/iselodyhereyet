<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
  <title>Baby Time?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #222;
    }

    /* Loading spinner */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      margin-top: 16px;
      color: #888;
      font-size: 0.9rem;
    }

    /* Tracker container */
    .tracker-wrapper {
      width: 100%;
      max-width: 800px;
      padding: 30px 20px;
    }

    /* Desktop: horizontal tracker */
    .tracker {
      display: flex;
      align-items: flex-start;
      position: relative;
      padding: 0 10px;
    }

    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .stage-marker {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #555;
      border: 3px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.4s, border-color 0.4s;
    }

    .stage-marker svg {
      display: none;
      width: 22px;
      height: 22px;
    }

    .stage-number {
      color: #999;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .stage-label {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      font-weight: 500;
      transition: color 0.4s;
    }

    /* Progress bar (behind markers) */
    .track {
      position: absolute;
      top: 22px;
      left: calc(10px + 22px);
      right: calc(10px + 22px);
      height: 6px;
      background: #555;
      transform: translateY(-50%);
      border-radius: 3px;
      overflow: hidden;
    }

    .track-fill {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* Completed stage */
    .stage.completed .stage-marker {
      background: #4CAF50;
      border-color: #4CAF50;
    }

    .stage.completed .stage-marker svg {
      display: block;
    }

    .stage.completed .stage-number {
      display: none;
    }

    .stage.completed .stage-label {
      color: #4CAF50;
      font-weight: 600;
    }

    /* Active stage */
    .stage.active .stage-marker {
      background: #555;
      border-color: #4CAF50;
      animation: pulse 2s ease-in-out infinite;
    }

    .stage.active .stage-number {
      color: #4CAF50;
    }

    .stage.active .stage-label {
      color: #333;
      font-weight: 600;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.5);
      }

      50% {
        box-shadow: 0 0 0 12px rgba(76, 175, 80, 0);
      }
    }

    /* Timestamp */
    .last-updated {
      text-align: center;
      padding: 10px 20px 0;
      color: #999;
      font-size: 0.8rem;
    }

    /* Notes section */
    #notes {
      width: 100%;
      max-width: 800px;
      padding: 20px;
    }

    /* Mobile: vertical tracker */
    @media (max-width: 600px) {
      .header {
        padding: 30px 20px 10px;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .tracker-wrapper {
        padding: 20px 30px;
      }

      .tracker {
        flex-direction: column;
        align-items: flex-start;
        padding: 0;
        padding-left: 22px;
      }

      .stage {
        flex-direction: row;
        align-items: center;
        width: 100%;
        padding: 12px 0;
      }

      .stage-marker {
        flex-shrink: 0;
      }

      .stage-label {
        margin-top: 0;
        margin-left: 16px;
        font-size: 0.95rem;
        text-align: left;
      }

      /* Vertical track */
      .track {
        top: calc(22px + 12px);
        bottom: calc(22px + 12px);
        left: calc(22px + 22px);
        right: auto;
        width: 6px;
        height: auto;
        transform: translateX(-50%);
      }

      .track-fill {
        width: 100%;
        height: 0%;
        transition: height 0.6s ease;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Baby-Time Tracker</h1>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <div class="loader-text">Checking status...</div>
  </div>

  <div id="tracker-wrapper" class="tracker-wrapper" style="display: none;">
    <div class="tracker">
      <div class="track">
        <div class="track-fill" id="track-fill"></div>
      </div>
      <div class="stage" data-stage="1">
        <div class="stage-marker">
          <span class="stage-number">1</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="stage-label">Waiting</div>
      </div>
      <div class="stage" data-stage="2">
        <div class="stage-marker">
          <span class="stage-number">2</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="stage-label">Early Labor</div>
      </div>
      <div class="stage" data-stage="3">
        <div class="stage-marker">
          <span class="stage-number">3</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="stage-label">Active Labor</div>
      </div>
      <div class="stage" data-stage="4">
        <div class="stage-marker">
          <span class="stage-number">4</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="stage-label">Delivery</div>
      </div>
      <div class="stage" data-stage="5">
        <div class="stage-marker">
          <span class="stage-number">5</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="stage-label">She's Here!</div>
      </div>
    </div>
  </div>

  <div id="last-updated" class="last-updated" style="display: none;"></div>

  <div id="notes"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
  <script>
    (function () {
      var loader = document.getElementById('loader');
      var wrapper = document.getElementById('tracker-wrapper');
      var lastUpdatedEl = document.getElementById('last-updated');
      var trackFill = document.getElementById('track-fill');
      var stages = document.querySelectorAll('.stage');
      var isMobile = window.matchMedia('(max-width: 600px)');

      function renderTracker(data) {
        var currentStage = data.stage;

        stages.forEach(function (el) {
          var stageNum = parseInt(el.getAttribute('data-stage'), 10);
          el.classList.remove('completed', 'active');
          if (stageNum < currentStage) {
            el.classList.add('completed');
          } else if (stageNum === currentStage) {
            el.classList.add('active');
          }
        });

        // Calculate fill percentage: progress goes from first marker to active marker
        // With 5 stages, there are 4 segments between them
        var fillPercent = ((currentStage - 1) / 4) * 100;
        if (isMobile.matches) {
          trackFill.style.height = fillPercent + '%';
          trackFill.style.width = '100%';
        } else {
          trackFill.style.width = fillPercent + '%';
          trackFill.style.height = '100%';
        }

        lastUpdatedEl.textContent = 'Last Updated: ' + data.lastUpdated;

        loader.style.display = 'none';
        wrapper.style.display = '';
        lastUpdatedEl.style.display = '';
      }

      function fetchStatus() {
        fetch('status.json?t=' + Date.now())
          .then(function (res) {
            if (!res.ok) throw new Error('Failed to fetch status');
            return res.json();
          })
          .then(renderTracker)
          .catch(function (err) {
            console.error('Error fetching status:', err);
          });
      }

      // Handle orientation/resize changes for fill direction
      isMobile.addEventListener('change', function () {
        // Re-render with current state if tracker is visible
        if (wrapper.style.display !== 'none') {
          var activeStage = document.querySelector('.stage.active');
          if (activeStage) {
            var stageNum = parseInt(activeStage.getAttribute('data-stage'), 10);
            var fillPercent = ((stageNum - 1) / 4) * 100;
            if (isMobile.matches) {
              trackFill.style.height = fillPercent + '%';
              trackFill.style.width = '100%';
            } else {
              trackFill.style.width = fillPercent + '%';
              trackFill.style.height = '100%';
            }
          }
        }
      });

      fetchStatus();
      setInterval(fetchStatus, 30000);

      // Notes
      fetch('notes.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
          document.getElementById('notes').innerHTML = DOMPurify.sanitize(html);
        });
    })();
  </script>
</body>

</html>
