<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23006491'/><circle cx='30' cy='35' r='10' fill='%23E31837'/><circle cx='70' cy='60' r='10' fill='%23E31837'/><circle cx='50' cy='50' r='6' fill='white'/></svg>">
  <title>Elody's Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
    }

    /* Top banner */
    .banner {
      background: #006491;
      padding: 14px 20px;
      text-align: center;
    }

    .banner h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Loading spinner */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #006491;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      margin-top: 16px;
      color: #888;
      font-size: 0.9rem;
    }

    /* Tracker card */
    .tracker-card {
      max-width: 700px;
      margin: 30px auto 0;
      padding: 0 24px;
      text-align: center;
    }

    /* Title — matches "DOMINO'S TRACKER®" */
    .tracker-title {
      color: #006491;
      font-size: 1.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .tracker-subtitle {
      color: #006491;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    /* Pill-shaped segmented bar */
    .tracker-bar {
      display: flex;
      border-radius: 30px;
      height: 55px;
      background: #69b8e5;
    }

    /* Each segment */
    .segment {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #69b8e5;
      position: relative;
      z-index: 1;
      transition: background 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
    }

    .segment:first-child {
      border-radius: 30px 0 0 30px;
    }

    .segment:last-child {
      border-radius: 0 30px 30px 0;
    }

    .segment span {
      color: #fff;
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 2;
    }

    /* Diagonal divider + color extension between segments */
    .segment:not(:last-child)::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 0;
      bottom: 0;
      width: 16px;
      background: inherit;
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      transform: skewX(-12deg);
      z-index: 1;
    }

    /* Completed segments — red */
    .segment.completed {
      background: #E31837;
    }

    /* Active segment — red */
    .segment.active {
      background: #E31837;
      transform: scaleX(1.05) scaleY(1.15);
      z-index: 3;
      box-shadow: 4px 4px 10px 4px rgba(0, 0, 0, 0.4);
    }

    .segment.active:not(:first-child)::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 0;
      bottom: 0;
      width: 16px;
      background: inherit;
      transform: skewX(-12deg);
      z-index: 1;
    }

    /* Status message below bar */
    .status-message {
      color: #006491;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 16px;
    }

    .status-message:empty {
      display: none;
    }

    /* Timestamp */
    .last-updated {
      text-align: center;
      padding: 8px 20px 0;
      color: #999;
      font-size: 0.75rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Subscribe banner */
    .subscribe-banner {
      max-width: 700px;
      margin: 20px auto 0;
      padding: 0 24px;
      text-align: center;
    }

    .subscribe-btn {
      background: #006491;
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s;
    }

    .subscribe-btn:hover {
      background: #005580;
    }

    .subscribe-btn:disabled {
      cursor: default;
    }

    .subscribe-btn.subscribed {
      background: #2a8c3e;
    }

    .subscribe-btn.subscribed:hover {
      background: #2a8c3e;
    }

    .ios-hint {
      color: #666;
      font-size: 0.8rem;
      margin-top: 10px;
      line-height: 1.5;
    }

    .subscribe-error {
      color: #E31837;
      font-size: 0.8rem;
      margin-top: 6px;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .banner {
        padding: 10px 16px;
      }

      .banner h1 {
        font-size: 1.05rem;
      }

      .tracker-card {
        margin: 20px 8px 0;
        padding: 0 12px;
      }

      .tracker-title {
        font-size: 1.3rem;
      }

      .tracker-subtitle {
        font-size: 0.85rem;
      }

      .tracker-bar {
        height: 45px;
      }

      .segment span {
        font-size: 0.55rem;
        letter-spacing: 0;
      }
    }
  </style>
</head>

<body>
  <div class="banner">
    <h1>Track Your Order</h1>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <div class="loader-text">Checking delivery status...</div>
  </div>

  <div id="tracker-card" class="tracker-card" style="display: none;">
    <h2 class="tracker-title">Elody's Tracker</h2>
    <div class="tracker-subtitle">Estimated delivery <strong>April 12th - April 14th</strong></div>
    <div class="tracker-bar">
      <div class="segment" data-stage="1"><span>Home</span></div>
      <div class="segment" data-stage="2"><span>Hospital</span></div>
      <div class="segment" data-stage="3"><span>Labor</span></div>
      <div class="segment" data-stage="4"><span>Delivery</span></div>
      <div class="segment" data-stage="5"><span>She's Here!</span></div>
    </div>
    <div id="status-message" class="status-message">Katie began preparing your order 9 months ago</div>
  </div>

  <div id="last-updated" class="last-updated" style="display: none;"></div>

  <div id="subscribe-banner" class="subscribe-banner" style="display: none;">
    <button id="subscribe-btn" class="subscribe-btn">Get notified of updates</button>
    <div id="ios-hint" class="ios-hint" style="display: none;">
      Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> first, then open from there and tap this button again.
    </div>
    <div id="subscribe-error" class="subscribe-error"></div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById('loader');
      var card = document.getElementById('tracker-card');
      var lastUpdatedEl = document.getElementById('last-updated');
      var segments = document.querySelectorAll('.segment');

      function renderTracker(data) {
        var currentStage = data.stage;

        segments.forEach(function (el) {
          var stageNum = parseInt(el.getAttribute('data-stage'), 10);
          el.classList.remove('completed', 'active');
          if (stageNum < currentStage) {
            el.classList.add('completed');
          } else if (stageNum === currentStage) {
            el.classList.add('active');
          }
        });

        lastUpdatedEl.textContent = 'Last Updated: ' + data.lastUpdated;

        loader.style.display = 'none';
        card.style.display = '';
        lastUpdatedEl.style.display = '';
      }

      function fetchStatus() {
        fetch('status.json?t=' + Date.now())
          .then(function (res) {
            if (!res.ok) throw new Error('Failed to fetch status');
            return res.json();
          })
          .then(renderTracker)
          .catch(function (err) {
            console.error('Error fetching status:', err);
          });
      }

      fetchStatus();
      setInterval(fetchStatus, 30000);
    })();

    // Register service worker for push notifications
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Push notification subscribe UI
    (function () {
      // TODO: Replace with your production VAPID public key and worker URL
      var VAPID_PUBLIC_KEY = 'BCVxsr7N_eNgVRqvHtD0zTZsEc6-VV-JvLexhqUzORcxaOzi6-AYWXvTBHm4bjyPjs7Vd8pZGH6SRpkNtoIAiw4';
      var SUBSCRIBE_URL = 'https://iselodyhereyet-sms.zachjustice.workers.dev/subscribe';

      var banner = document.getElementById('subscribe-banner');
      var btn = document.getElementById('subscribe-btn');
      var iosHint = document.getElementById('ios-hint');
      var errorEl = document.getElementById('subscribe-error');

      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

      banner.style.display = '';

      // Detect iOS not in standalone mode
      var isIos = /iPad|iPhone|iPod/.test(navigator.userAgent);
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;

      if (isIos && !isStandalone) {
        btn.style.display = 'none';
        iosHint.style.display = '';
        return;
      }

      // Check existing subscription
      navigator.serviceWorker.ready.then(function (reg) {
        return reg.pushManager.getSubscription();
      }).then(function (sub) {
        if (sub) {
          showSubscribed();
        }
      });

      btn.addEventListener('click', function () {
        btn.disabled = true;
        btn.textContent = 'Subscribing...';
        errorEl.textContent = '';

        Notification.requestPermission().then(function (permission) {
          if (permission !== 'granted') {
            btn.textContent = 'Get notified of updates';
            btn.disabled = false;
            errorEl.textContent = 'Notification permission was denied.';
            return;
          }

          return navigator.serviceWorker.ready.then(function (reg) {
            return reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
            });
          }).then(function (sub) {
            return fetch(SUBSCRIBE_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(sub),
            });
          }).then(function (res) {
            if (!res.ok) throw new Error('Server error');
            showSubscribed();
          }).catch(function (err) {
            console.error('Subscribe failed:', err);
            btn.textContent = 'Get notified of updates';
            btn.disabled = false;
            errorEl.textContent = 'Failed to subscribe. Try again.';
          });
        });
      });

      function showSubscribed() {
        btn.textContent = 'Notifications enabled';
        btn.classList.add('subscribed');
        btn.disabled = true;
      }

      function urlBase64ToUint8Array(base64String) {
        var padding = '='.repeat((4 - base64String.length % 4) % 4);
        var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        var rawData = atob(base64);
        var outputArray = new Uint8Array(rawData.length);
        for (var i = 0; i < rawData.length; i++) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }
    })();
  </script>
</body>

</html>
