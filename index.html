<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23006491'/><circle cx='30' cy='35' r='10' fill='%23E31837'/><circle cx='70' cy='60' r='10' fill='%23E31837'/><circle cx='50' cy='50' r='6' fill='white'/></svg>">
  <title>Elody's Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
    }

    /* Top banner */
    .banner {
      background: #006491;
      padding: 14px 20px;
      text-align: center;
    }

    .banner h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Order header */
    .order-header {
      background: #fff;
      border-bottom: 3px solid #E31837;
      padding: 20px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .order-header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-detail {
      font-size: 0.85rem;
      color: #555;
      line-height: 1.5;
    }

    .order-detail strong {
      color: #006491;
      font-weight: 700;
    }

    .order-eta {
      text-align: right;
    }

    .order-eta .eta-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .order-eta .eta-date {
      font-size: 1.4rem;
      font-weight: 700;
      color: #E31837;
    }

    /* Loading spinner */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #006491;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      margin-top: 16px;
      color: #888;
      font-size: 0.9rem;
    }

    /* Tracker card */
    .tracker-card {
      background: #fff;
      max-width: 900px;
      margin: 24px auto 0;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 32px 24px 24px;
    }

    /* Tracker container — always horizontal */
    .tracker {
      display: flex;
      align-items: flex-start;
      position: relative;
      padding: 0 20px;
    }

    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .stage-marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ccc;
      border: 3px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.4s, border-color 0.4s;
    }

    .stage-number {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .stage-label {
      margin-top: 8px;
      font-size: 0.75rem;
      color: #999;
      text-align: center;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: color 0.4s;
    }

    /* Progress track */
    .track {
      position: absolute;
      top: 20px;
      left: calc(20px + 20px);
      right: calc(20px + 20px);
      height: 8px;
      background: #e0e0e0;
      transform: translateY(-50%);
      border-radius: 4px;
      overflow: hidden;
    }

    .track-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.6s ease;
      background: #006491;
      background-image: linear-gradient(
        -45deg,
        rgba(255, 255, 255, 0.2) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255, 255, 255, 0.2) 50%,
        rgba(255, 255, 255, 0.2) 75%,
        transparent 75%,
        transparent
      );
      background-size: 20px 20px;
      animation: barberpole 1s linear infinite;
    }

    @keyframes barberpole {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 20px 0;
      }
    }

    /* Completed stage */
    .stage.completed .stage-marker {
      background: #006491;
      border-color: #006491;
    }

    .stage.completed .stage-label {
      color: #006491;
    }

    /* Active stage */
    .stage.active .stage-marker {
      background: #E31837;
      border-color: #E31837;
      animation: pulse 2s ease-in-out infinite;
    }

    .stage.active .stage-label {
      color: #E31837;
      font-weight: 700;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(227, 24, 55, 0.5);
      }
      50% {
        box-shadow: 0 0 0 12px rgba(227, 24, 55, 0);
      }
    }

    /* Timestamp */
    .last-updated {
      text-align: center;
      padding: 14px 20px 0;
      color: #999;
      font-size: 0.75rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Notes section */
    #notes {
      max-width: 900px;
      margin: 20px auto 0;
      padding: 0 24px 24px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #444;
    }

    #notes:empty {
      display: none;
    }

    /* Mobile adjustments — keep horizontal but compact */
    @media (max-width: 480px) {
      .banner {
        padding: 10px 16px;
      }

      .banner h1 {
        font-size: 1.05rem;
      }

      .order-header {
        padding: 14px 16px;
      }

      .order-header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .order-eta {
        text-align: left;
      }

      .order-eta .eta-date {
        font-size: 1.2rem;
      }

      .tracker-card {
        margin: 16px 8px 0;
        padding: 24px 8px 16px;
      }

      .tracker {
        padding: 0 4px;
      }

      .stage-marker {
        width: 32px;
        height: 32px;
      }

      .stage-number {
        font-size: 0.75rem;
      }

      .stage-label {
        font-size: 0.6rem;
        margin-top: 6px;
        letter-spacing: 0;
      }

      .track {
        top: 16px;
        left: calc(4px + 16px);
        right: calc(4px + 16px);
        height: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="banner">
    <h1>Elody's Delivery Tracker</h1>
  </div>

  <div class="order-header">
    <div class="order-header-inner">
      <div class="order-detail">
        <strong>Order:</strong> Elody Ann Justice<br>
        <strong>Delivering from:</strong> Hospital Special Delivery Unit
      </div>
      <div class="order-eta">
        <div class="eta-label">Estimated Arrival</div>
        <div class="eta-date">April 12th</div>
      </div>
    </div>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <div class="loader-text">Checking delivery status...</div>
  </div>

  <div id="tracker-card" class="tracker-card" style="display: none;">
    <div class="tracker">
      <div class="track">
        <div class="track-fill" id="track-fill"></div>
      </div>
      <div class="stage" data-stage="1">
        <div class="stage-marker">
          <span class="stage-number">1</span>
        </div>
        <div class="stage-label">Waiting</div>
      </div>
      <div class="stage" data-stage="2">
        <div class="stage-marker">
          <span class="stage-number">2</span>
        </div>
        <div class="stage-label">Early Labor</div>
      </div>
      <div class="stage" data-stage="3">
        <div class="stage-marker">
          <span class="stage-number">3</span>
        </div>
        <div class="stage-label">Active Labor</div>
      </div>
      <div class="stage" data-stage="4">
        <div class="stage-marker">
          <span class="stage-number">4</span>
        </div>
        <div class="stage-label">Delivery</div>
      </div>
      <div class="stage" data-stage="5">
        <div class="stage-marker">
          <span class="stage-number">5</span>
        </div>
        <div class="stage-label">She's Here!</div>
      </div>
    </div>
  </div>

  <div id="last-updated" class="last-updated" style="display: none;"></div>

  <div id="notes"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
  <script>
    (function () {
      var loader = document.getElementById('loader');
      var card = document.getElementById('tracker-card');
      var lastUpdatedEl = document.getElementById('last-updated');
      var trackFill = document.getElementById('track-fill');
      var stages = document.querySelectorAll('.stage');

      function renderTracker(data) {
        var currentStage = data.stage;

        stages.forEach(function (el) {
          var stageNum = parseInt(el.getAttribute('data-stage'), 10);
          el.classList.remove('completed', 'active');
          if (stageNum < currentStage) {
            el.classList.add('completed');
          } else if (stageNum === currentStage) {
            el.classList.add('active');
          }
        });

        var fillPercent = ((currentStage - 1) / 4) * 100;
        trackFill.style.width = fillPercent + '%';

        lastUpdatedEl.textContent = 'Last Updated: ' + data.lastUpdated;

        loader.style.display = 'none';
        card.style.display = '';
        lastUpdatedEl.style.display = '';
      }

      function fetchStatus() {
        fetch('status.json?t=' + Date.now())
          .then(function (res) {
            if (!res.ok) throw new Error('Failed to fetch status');
            return res.json();
          })
          .then(renderTracker)
          .catch(function (err) {
            console.error('Error fetching status:', err);
          });
      }

      fetchStatus();
      setInterval(fetchStatus, 30000);

      // Notes
      fetch('notes.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
          document.getElementById('notes').innerHTML = DOMPurify.sanitize(html);
        });
    })();
  </script>
</body>

</html>
